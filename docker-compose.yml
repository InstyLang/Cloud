services:
  cloud-server:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      CLOUD_PORT: "8080"
      DATABASE_URL: postgres://cloud:cloud@postgres:5432/cloud
      S3_ENDPOINT: http://minio:9000
      S3_BUCKET: cloud-packages
      S3_REGION: us-east-1
      S3_ACCESS_KEY_ID: minioadmin
      S3_SECRET_ACCESS_KEY: minioadmin
      CLOUD_BOOTSTRAP_TOKEN: change-me-bootstrap-token
      CLOUD_MAX_PACKAGE_BYTES: "52428800"
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_started
      create-bucket:
        condition: service_completed_successfully
    ports:
      - "8080:8080"

  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: cloud
      POSTGRES_USER: cloud
      POSTGRES_PASSWORD: cloud
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cloud -d cloud"]
      interval: 5s
      timeout: 5s
      retries: 20
    volumes:
      - cloud-postgres:/var/lib/postgresql/data

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - cloud-minio:/data

  create-bucket:
    image: minio/mc:latest
    depends_on:
      - minio
    entrypoint: ["/bin/sh", "-c"]
    command: >
      "mc alias set local http://minio:9000 minioadmin minioadmin &&
       mc mb --ignore-existing local/cloud-packages"

volumes:
  cloud-postgres:
  cloud-minio:
